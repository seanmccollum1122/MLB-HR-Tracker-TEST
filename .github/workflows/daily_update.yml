name: Daily MLB HR Sync

on:
  schedule:
    # 12:00 UTC is 8:00 AM ET
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  # This line tells GitHub to use the new Node 24 engine immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # v4 is the modern standard for 2026
        uses: actions/checkout@v4 

      - name: Set up Python
        # v5 is the current stable version for 2026
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests pandas openpyxl

      - name: Run Scraper
        run: python mlb_scraper.py

      - name: Commit and Push Excel File
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add MLB_2026_Team_Power.xlsx
          git commit -m "Automated Daily HR Update" || echo "No changes to commit"
          git push
