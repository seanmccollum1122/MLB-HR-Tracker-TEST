name: Daily MLB HR Sync

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # We move the 'env' here to make it strictly applied to this job
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests pandas openpyxl

      - name: Run Scraper
        run: python mlb_scraper.py

      - name: Commit and Push Excel File
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add MLB_2026_Team_Power.xlsx
          git commit -m "Automated Daily HR Update" || echo "No changes to commit"
          git push
